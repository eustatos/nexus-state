name: Tests & Coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Run tests with coverage
        run: pnpm test:coverage
      
      - name: Merge coverage reports
        run: |
          mkdir -p coverage
          # Объединяем все lcov.info файлы из пакетов с префиксами путей
          > coverage/lcov.info
          for file in packages/*/coverage/lcov.info; do
            if [ -f "$file" ]; then
              package_name=$(echo "$file" | sed 's|packages/\([^/]*\)/coverage/lcov.info|\1|')
              sed "s|^SF:|SF:packages/$package_name/|g" "$file" >> coverage/lcov.info
            fi
          done
      
      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: ./coverage/lcov.info
          # Добавляем flag для идентификации пакета в монорепозитории
          flag-name: all-packages
          parallel: true
      
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
