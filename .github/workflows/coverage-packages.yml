name: Package Coverage - All Packages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - name: core
            filter: '@nexus-state/core'
          - name: react
            filter: '@nexus-state/react'
          - name: family
            filter: '@nexus-state/family'
          - name: async
            filter: '@nexus-state/async'
          - name: devtools
            filter: '@nexus-state/devtools'
          - name: form
            filter: '@nexus-state/form'
          - name: immer
            filter: '@nexus-state/immer'
          - name: middleware
            filter: '@nexus-state/middleware'
          - name: persist
            filter: '@nexus-state/persist'
          - name: query
            filter: '@nexus-state/query'
          - name: svelte
            filter: '@nexus-state/svelte'
          - name: vue
            filter: '@nexus-state/vue'
          - name: web-worker
            filter: '@nexus-state/web-worker'
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --shamefully-hoist

      - name: Build all packages
        run: pnpm build

      - name: Run tests with coverage
        run: pnpm --filter ${{ matrix.package.filter }} test:coverage
        timeout-minutes: 15

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package.name }}
          path: packages/${{ matrix.package.name }}/coverage/lcov.info
          retention-days: 1
          if-no-files-found: error

  send-to-coveralls:
    runs-on: ubuntu-latest
    needs: test-coverage
    strategy:
      matrix:
        package:
          - name: core
            flag: core
          - name: react
            flag: react
          - name: family
            flag: family
          - name: async
            flag: async
          - name: devtools
            flag: devtools
          - name: form
            flag: form
          - name: immer
            flag: immer
          - name: middleware
            flag: middleware
          - name: persist
            flag: persist
          - name: query
            flag: query
          - name: svelte
            flag: svelte
          - name: vue
            flag: vue
          - name: web-worker
            flag: web-worker
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-${{ matrix.package.name }}
          path: packages/${{ matrix.package.name }}/coverage/

      - name: Send to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: packages/${{ matrix.package.name }}/coverage/lcov.info
          flag-name: ${{ matrix.package.flag }}
          parallel: true

  coveralls-finished:
    runs-on: ubuntu-latest
    needs: send-to-coveralls
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
